<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SkyPath visual tests</title>
    <!--
      The page Vitest renders the visual tests into. It exists to carry the
      same font <link>s as the real index.html — without them the browser
      silently falls back to Helvetica, every screenshot lies about the
      typography, and a `font-family` assertion passes on the *declared*
      family while the face never loaded.

      Keep in sync with index.html.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Red+Hat+Display:ital,wght@0,300..900;1,300..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body></body>
</html>
